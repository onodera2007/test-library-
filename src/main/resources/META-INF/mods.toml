modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL="${displayURL}"
logoFile="META-INF/modlogo.png"
authors="${mod_authors}"
description='''${mod_description}'''
[[mixins]]
config="changede.mixins.json"
[[dependencies.changede]]
    modId="minecraft"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.changede]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}" 
    side="BOTH"
[[dependencies.changede]]
    modId="changed"
    mandatory=true
    versionRange="[0.15.0,)"
    ordering="NONE"
    side="BOTH"
[[dependencies.changede]]
    modId="changed_addon"
    mandatory=true
    versionRange="[2.8.0,)"
    ordering="BEFORE"
    side="BOTH"
[[dependencies.changede]]
    modId="projecte"
    mandatory=false
    versionRange="[1.0.0,)"
    ordering="BEFORE"
    side="BOTH"
[[dependencies.changede]]
    modId="projectextended"
    mandatory=false
    versionRange="[1.5.0,)"
    ordering="BEFORE"
    side="BOTH"

